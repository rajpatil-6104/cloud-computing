<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Smart Dashboard</title>

  <!-- Mobile Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Zoom Plugin -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 20px;
      color: #38bdf8;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
      width: 250px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    .chart-container {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }
    .value {
      font-size: 28px;
      margin-top: 10px;
      color: #22c55e;
    }

    canvas {
      background: white;
      margin: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 900px;
    }

    .alert {
      color: red;
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🌐 ESP32 Smart Monitoring Dashboard</h1>

<div class="container">
  <div class="card">
    <h2>🌡 Temperature</h2>
    <div id="temp" class="value">--</div>
  </div>

  <div class="card">
    <h2>💧 Humidity</h2>
    <div id="hum" class="value">--</div>
  </div>

  <div class="card">
    <h2>💨 Gas</h2>
    <div id="gas" class="value">--</div>
  </div>
</div>

<div id="alert"></div>
<div class="chart-container">
  <canvas id="tempChart"></canvas>
</div>
<div class="chart-container">
  <canvas id="humChart"></canvas>
</div>
<div class="chart-container">
  <canvas id="gasChart"></canvas>
</div>

<script>
const channelID = "3342972";
const readAPI = "ZGGD6A2K24HMQ9QO";

let tempChart, humChart, gasChart;

async function fetchData() {
  const url = `https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readAPI}&results=20`;
  const res = await fetch(url);
  const data = await res.json();

  let temps = [], hums = [], gases = [], labels = [];

  data.feeds.forEach(feed => {
    labels.push(new Date(feed.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
    temps.push(parseFloat(feed.field1) || 0);
    hums.push(parseFloat(feed.field2) || 0);
    gases.push(parseFloat(feed.field3) || 0);
  });

  document.getElementById("temp").innerText = temps.at(-1) + " °C";
  document.getElementById("hum").innerText = hums.at(-1) + " %";
  document.getElementById("gas").innerText = gases.at(-1);

  if (gases.at(-1) > 2000) {
    document.getElementById("alert").innerHTML = "<p class='alert'>⚠ GAS ALERT!</p>";
  } else {
    document.getElementById("alert").innerHTML = "";
  }

  drawCharts(labels, temps, hums, gases);
}

function drawCharts(labels, t, h, g) {

  if (tempChart) tempChart.destroy();
  if (humChart) humChart.destroy();
  if (gasChart) gasChart.destroy();

  // 🌡 Temperature
  tempChart = new Chart(document.getElementById("tempChart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: "Temperature (°C)",
        data: t,
        borderColor: "red",
        backgroundColor: "rgba(255,0,0,0.2)",
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        zoom: {
          zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' },
          pan: { enabled: true, mode: 'x' }
        }
      },
      scales: {
        y: { min: 0, max: 100 }
      }
    }
  });

  // 💧 Humidity
  humChart = new Chart(document.getElementById("humChart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: "Humidity (%)",
        data: h,
        borderColor: "blue",
        backgroundColor: "rgba(0,0,255,0.2)",
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        zoom: {
          zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' },
          pan: { enabled: true, mode: 'x' }
        }
      },
      scales: {
        y: { min: 0, max: 100 }
      }
    }
  });

  // 💨 Gas
  gasChart = new Chart(document.getElementById("gasChart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: "Gas Level",
        data: g,
        borderColor: "green",
        backgroundColor: "rgba(0,255,0,0.2)",
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        zoom: {
          zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' },
          pan: { enabled: true, mode: 'x' }
        }
      }
    }
  });
}

fetchData();
setInterval(fetchData, 15000);
</script>

</body>
</html>
